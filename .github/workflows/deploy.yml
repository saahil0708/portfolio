name: Deploy Portfolio

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t saahil0708/portfolio:latest .

      - name: Push Docker Image
        run: |
          docker push saahil0708/portfolio:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull saahil0708/portfolio:latest

            sudo docker stop portfolio || true
            sudo docker rm portfolio || true

            sudo docker run -d \
              --name portfolio \
              --restart unless-stopped \
              -p 3000:3000 \
              saahil0708/portfolio:latest